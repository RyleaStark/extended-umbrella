version: "3.9"

services:
  app_proxy:
    environment:
      APP_HOST: extended-umbrella-lnswitchboard_app_1
      APP_PORT: 22121
      PROXY_AUTH_WHITELIST: "/.well-known/*"
  app:
    image: ghcr.io/ryleastark/lnswitchboard:0.1.31@sha256:d02b7b7e9a54503a9cc842f4a79e9537dc7a0eb43677fe628ade6932e23e09dd
    user: "1000:1000"
    restart: on-failure
    environment:
      SERVICE_PORT: 22121
      LND_HOST: "$APP_LIGHTNING_NODE_IP"
      LND_GRPC_PORT: "$APP_LIGHTNING_NODE_GRPC_PORT"
      LND_TLS_PATH: "/lnd/tls.cert"
      DATA_STORE_PATH: "secrets/lnswitchboard.db"
      LND_MACAROON_PATH: "/lnd/data/chain/bitcoin/${APP_BITCOIN_NETWORK}/invoice.macaroon"
    volumes:
      - ${APP_LIGHTNING_NODE_DATA_DIR}:/lnd:ro
      - ${APP_DATA_DIR}/data/secrets:/app/secrets:rw
      - ${UMBREL_ROOT}/app-data/lightning/data/lnd:/lnd:ro